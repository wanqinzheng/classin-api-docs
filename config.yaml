# ClassIn API Docs Skill - 配置文件
# 检索模式配置：local = 本地向量检索 | llm = LLM 辅助检索/重排序

# ============================================================
# 检索模式
# ============================================================
#   local  : 使用 ChromaDB 本地向量检索（无需 API Key，完全离线）
#   llm    : 先向量检索召回，再用 LLM 做重排序/判断相关性
# ============================================================
retrieval_mode: local

# ============================================================
# 本地向量检索配置（retrieval_mode: local 时使用）
# ============================================================
local:
  top_k: 6                    # 召回片段数量
  score_threshold: 0.30       # 相关度阈值（0~1），低于此值的片段会被过滤

# ============================================================
# LLM 辅助检索配置（retrieval_mode: llm 时使用）
# ============================================================
llm:
  provider: openai            # 提供商：openai | claude | dashscope | ollama

  # ── OpenAI ──────────────────────────────────────────────
  openai:
    model: gpt-4o-mini       # 用于重排序的模型
    api_key: ""              # 你的 OpenAI API Key（留空则读取 OPENAI_API_KEY 环境变量）
    base_url: ""             # 可选：代理地址，例如 "https://api.openai.com/v1"
    timeout: 30              # 请求超时（秒）

  # ── Claude (Anthropic) ──────────────────────────────────
  claude:
    model: claude-3-haiku-20240307
    api_key: ""              # 留空则读取 ANTHROPIC_API_KEY 环境变量
    base_url: ""             # 通常留空，Claude 用官方地址
    timeout: 30

  # ── 阿里通义 / DashScope ────────────────────────────────
  dashscope:
    model: qwen-plus
    api_key: ""              # 留空则读取 DASHSCOPE_API_KEY 环境变量
    base_url: https://dashscope.aliyuncs.com/api/v1
    timeout: 30

  # ── Ollama（本地大模型）─────────────────────────────────
  ollama:
    model: qwen2.5:7b         # 本地部署的模型名
    base_url: http://localhost:11434/v1
    api_key: ollama           # Ollama 不需要真实 key，但字段不能为空
    timeout: 120

  # ── 重排序策略 ──────────────────────────────────────────
  rerank:
    enabled: true            # 是否启用 LLM 重排序（推荐开启，效果更好）
    candidate_count: 10      # 传给 LLM 重排序的候选片段数（从向量库召回更多再精选）
    final_top_k: 4           # 最终返回给 AI 的片段数
    prompt_template: |
      以下是关于 ClassIn API 的文档片段，请判断每个片段是否与用户问题相关。
      用户问题：{query}

      片段列表：
      {chunks}

      请按相关度从高到低输出片段编号，例如：1, 3, 2
      只输出编号，用逗号分隔，不要输出其他内容。
